name: Publish

# Trusted Publishing flow:
#   - Push tag `vX.Y.Z`        → build + publish to TestPyPI
#   - Create a GitHub Release  → build + publish to PyPI
#
# No API tokens are stored. Configure Trusted Publishers on
# (Test)PyPI for this repository + workflow before tagging.
# Docs: https://docs.pypi.org/trusted-publishers/

on:
  push:
    tags: ["v*.*.*"]
  release:
    types: [published]

permissions:
  contents: read

jobs:
  build:
    name: build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build sdist + wheel
        run: python -m build
      - name: Validate metadata
        run: twine check --strict dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish-testpypi:
    name: publish to TestPyPI
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/p/paylinker-django
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish-pypi:
    name: publish to PyPI
    needs: build
    if: github.event_name == 'release' && github.event.action == 'published'
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/paylinker-django
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1